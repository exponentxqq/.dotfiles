# Codex CLI Configuration
# 使用方法:
#   codex --profile glm              → GLM (智谱) via Z.AI
#   codex --profile deepseek         → DeepSeek V4 Pro
#   codex -p deepseek-flash          → DeepSeek V4 Flash
#
# 环境变量 (在 .zshrc 中设置):
#   export GLM_API_KEY="your-glm-api-key"
#   export DEEPSEEK_API_KEY="your-deepseek-api-key"

# ─── GLM (智谱) via Z.AI ───────────────────────────────────
[model_providers.glm]
name = "GLM (智谱)"
base_url = "https://api.z.ai/v1"
env_key = "GLM_API_KEY"
wire_api = "chat"

# ─── DeepSeek ───────────────────────────────────────────────
# 注意: DeepSeek 直连可能存在兼容性问题 (tool_calls 消息格式)
# 若遇到问题, 可改用 OpenRouter BYOK 方案
[model_providers.deepseek]
name = "DeepSeek"
base_url = "https://api.deepseek.com"
env_key = "DEEPSEEK_API_KEY"
wire_api = "chat"

# ─── OpenRouter (DeepSeek fallback) ─────────────────────────
# 通过 OpenRouter 路由 DeepSeek 请求, 解决 Responses API 兼容问题
# 免费额度: <1M requests/month
# 需设置: export OPENROUTER_API_KEY="your-openrouter-key"
[model_providers.openrouter]
name = "OpenRouter"
base_url = "https://openrouter.ai/api/v1"
env_key = "OPENROUTER_API_KEY"
wire_api = "chat"

# ─── Profiles ───────────────────────────────────────────────
[profiles.glm]
model = "glm-4.7"
model_provider = "glm"

[profiles.glm-5]
model = "glm-5"
model_provider = "glm"

[profiles.glm-5-1]
model = "glm-5.1"
model_provider = "glm"

[profiles.deepseek]
model = "deepseek-v4-pro"
model_provider = "deepseek"

[profiles.deepseek-flash]
model = "deepseek-v4-flash"
model_provider = "deepseek"

[profiles.openrouter-deepseek]
model = "deepseek/deepseek-v4-pro"
model_provider = "openrouter"

[profiles.openrouter-deepseek-flash]
model = "deepseek/deepseek-v4-flash"
model_provider = "openrouter"

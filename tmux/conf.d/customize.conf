# Status bar customization
# Overrides tokyo-night-tmux theme defaults for a cleaner, more readable layout
# Loads AFTER plugins.conf (TPM init) to ensure theme loads first

# -- 左侧：会话名 + 主机名 --
# [蓝底白字] 会话名 [过渡] [灰字]@主机名
set-option -g status-left "\
#[fg=#1A1B26,bg=#7aa2f7,bold] ❐ #S \
#[fg=#7aa2f7,bg=#1A1B26,nobold]#[fg=#414868] @#H "

# -- 窗口列表 --
# 当前窗口：绿底黑字 #I | #W
# 其他窗口：浅灰
set-option -g window-status-current-format "\
#[fg=#1A1B26,bg=#73daca,bold] #I | #W \
#[fg=#73daca,bg=#1A1B26,nobold]"

set-option -g window-status-format "\
#[fg=#a9b1d6,bg=#1A1B26,dim] #I | #W "

set-option -g window-status-separator " "

# -- 右侧：CPU/RAM | 日期时间 | 用户@主机 --
set-option -g status-right "\
#[fg=#a9b1d6,bg=#2A2F41] #{cpu_icon} #{cpu_percentage}  #{ram_icon} #{ram_percentage} \
#[fg=#a9b1d6,bg=#2A2F41] %Y-%m-%d %H:%M \
#[fg=#2A2F41,bg=#1A1B26]#[fg=#414868] #(whoami)@#H "

# 触发 tmux-cpu 插件插值，将 #{cpu_percentage} 等占位符替换为实际脚本调用
run 'bash ~/.config/tmux/plugins/tmux-cpu/cpu.tmux'

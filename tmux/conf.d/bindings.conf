# 第二 prefix
set -g prefix2 C-t
bind C-t send-prefix -2

# Session 管理
bind C-c new-session
bind C-f command-prompt -p find-session 'switch-client -t %%'

# 分屏（vim 风格方向键，prefix + C + h/j/k/l）
bind C-h split-window -bh
bind C-j split-window -v
bind C-k split-window -bv
bind C-l split-window -h

# Pane 导航（prefix + h/j/k/l，可重复）
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Pane 交换
bind > swap-pane -D
bind < swap-pane -U

# Pane 调整大小
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# Window 切换
bind Tab last-window

# 最大化 pane
bind + run '~/.config/tmux/scripts/maximize_pane.sh "#{session_name}"'

# 实用工具
bind r source-file ~/.config/tmux/tmux.conf \; display 'tmux.conf sourced'
bind m run '~/.config/tmux/scripts/toggle_mouse.sh'

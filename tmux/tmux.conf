# tmux configuration - modular setup
# Path principle: all paths use symlinked application paths (~/.config/tmux/)

source-file ~/.config/tmux/conf.d/options.conf
source-file ~/.config/tmux/conf.d/bindings.conf
source-file ~/.config/tmux/conf.d/copy-mode.conf
source-file ~/.config/tmux/conf.d/plugins.conf
source-file ~/.config/tmux/conf.d/customize.conf

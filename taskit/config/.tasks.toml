# ─── Presets ───────────────────────────────────────────────

[[preset]]
name = "docker-dev"
cwd = "${%HOME}/develop/docker"

[style]
task_name = "green bold"
command = "blue"

# ─── Utility ────────────────────────────────────────────────

[tasks."util.port"]
cmd = "sudo lsof -i :${?port|3000,8080,3306,5432,80,443}"

[tasks."ip.local"]
cmd = "ifconfig | grep -E 'inet.[0-9]' | grep -v '127.0.0.1' | awk '{ print $2}'"

[tasks."ip.public"]
cmd = "curl -s ifconfig.me"

[tasks."util.bigfile"]
cmd = "find ${?path} -type f -size +10000k"

[tasks."file.count"]
cmd = "find ${?path} -type f | wc -l"

# ─── Claude Model ───────────────────────────────────────────

[tasks.model]
cmd = { steps = [
    { run = "ln -sf ~/develop/dotfiles/claude/settings.${args.PROVIDER}.json .claude/settings.json", allow_failure = true },
    { run = "readlink .claude/settings.json" },
] }

[tasks.model.args.PROVIDER]
flag = "--provider"
prompt = "Select provider"
options = ["deepseek", "glm", "mimo", "litellm"]
required = true

# ─── MySQL ──────────────────────────────────────────────────

[tasks."mysql.reset"]
uses = "docker-dev"
cmd = "run.sh mysql \"mysql -uroot -p123456 -e 'drop database if exists ${?db_name};create database if not exists ${?db_name}'\""

# ─── Docker (支持多选: taskit select 或 taskit fzf) ────────

[tasks."docker.in"]
uses = "docker-dev"
cmd = "docker compose exec ${?container} /bin/${?bash|bash,sh,zsh}"

[tasks."docker.up"]
uses = "docker-dev"
cmd = "docker compose stop ${?container} && docker compose up -d ${?container}"

[tasks."docker.stop"]
uses = "docker-dev"
cmd = "docker compose stop ${?container}"

[tasks."docker.rm-image"]
cmd = "docker rmi -f $(docker images|grep \"${?image}\"|awk '{print $3}')"

[tasks."docker.clear-container"]
cmd = "docker container prune"

[tasks."docker.clear-image"]
cmd = "docker image prune"

# ─── Project ────────────────────────────────────────────────

[tasks."project.migration"]
cmd = "bash generate_migrate.sh ${?module} ${?description}"

[tasks."project.migrate"]
uses = "docker-dev"
cmd = "run.sh java \"pwd && flyway -url='jdbc:mysql://dockerhost:3306/${?db_name}?useTimezone=true&serverTimezone=GMT%2B8&useUnicode=true&characterEncoding=utf-8' -user=root -password=123456 -locations='filesystem:$(pwd)/modules/**/src/main/resources/db/migration' migrate\""

# ─── Tmux ───────────────────────────────────────────────────

[tasks."tmux.new"]
cmd = "tmux new -s ${?session}"

[tasks."tmux.attach"]
cmd = "tmux attach -t ${?session}"

[tasks."tmux.kill"]
cmd = "tmux kill-session -t ${?session}"

# ─── Codebase Memory MCP ──────────────────────────────────

[tasks."codebase.index-all"]
cmd = '''
for gitdir in $(find ~/develop -maxdepth 5 -type d -name .git -prune); do
  repo=$(dirname "$gitdir")
  echo "=== Indexing $repo ==="
  codebase-memory-mcp cli index_repository "{\"repo_path\": \"$repo\"}"
done
'''

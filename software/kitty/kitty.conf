include theme.conf

# Font
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0

# CJK fallback
modify_font cell_height 120%

# Cursor
cursor_shape beam
cursor_blink_interval 0

# Scrollback
scrollback_lines 10000

# Mouse
url_style curly
copy_on_select yes

# Bell
enable_audio_bell no

# Window layout
remember_window_size  no
initial_window_width  140c
initial_window_height 40c
window_padding_width 4
window_border_width 1pt
hide_window_decorations titlebar-only

# Tab bar
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted

# Keybindings - splits (similar to Terminator)
map ctrl+shift+enter    launch --location=vsplit --cwd=current
map ctrl+shift+backspace launch --location=hsplit --cwd=current
map ctrl+shift+w        close_window

# Keybindings - tabs
map ctrl+shift+t        new_tab_with_cwd
map ctrl+shift+q        close_tab
map ctrl+shift+right    next_tab
map ctrl+shift+left     previous_tab

# Keybindings - font size
map ctrl+shift+equal    change_font_size all +1.0
map ctrl+shift+minus    change_font_size all -1.0
map ctrl+shift+0        change_font_size all 0

# Keybindings - misc
map ctrl+shift+c        copy_to_clipboard
map ctrl+shift+v        paste_from_clipboard
map ctrl+shift+f        launch --type=overlay --stdin-source=@screen_scrollback fzf --no-mouse --exact -i --no-mouse

# Integration with Neovim
allow_kitty_graphics yes
term xterm-kitty

# Force X11 backend for input method compatibility
linux_display_server x11
